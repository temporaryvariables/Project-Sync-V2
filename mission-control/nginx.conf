server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single page app: fall back to index.html for client side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
